version: "3.9"

services:
  facenet:
    build:
      context: ./facenet_service
      dockerfile: Dockerfile
    container_name: facefind-facenet
    ports:
      - "8001:8001"
    restart: always
    networks:
      - facefind-network
    volumes:
      - deepface_weights:/root/.deepface/weights

  backend:
    build:
      context: ./python-backend
      dockerfile: Dockerfile
      args:
        AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID:-}
        AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
        AWS_REGION:            ${AWS_REGION:-ap-south-1}
        MODEL_S3_BUCKET:       ${MODEL_S3_BUCKET:-forensic-models}
        FACENET_S3_KEY:        ${FACENET_S3_KEY:-facenet512_weights.h5}
        INSIGHTFACE_S3_KEY:    ${INSIGHTFACE_S3_KEY:-w600k_r50.onnx}
    container_name: facefind-backend
    ports:
      - "5001:5001"
    env_file:
      - ./python-backend/.env
    depends_on:
      - facenet
    restart: always
    networks:
      - facefind-network
    volumes:
      - deepface_weights:/root/.deepface/weights
      - insightface_models:/root/.insightface/models
    environment:
      # Internal Docker hostname for the Facenet microservice
      FACENET_API_URL: http://facenet:8001

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: facefind-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always
    networks:
      - facefind-network

networks:
  facefind-network:
    driver: bridge

volumes:
  deepface_weights:
  insightface_models:
